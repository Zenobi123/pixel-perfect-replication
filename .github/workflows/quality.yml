name: Qualité
on:
  pull_request:
  push:
    branches: [main]
jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Valeurs publiques (clé anon / URL) : sûres à exposer, la sécurité repose
      # sur la RLS. Elles remplacent le `.env` qui n'est plus versionné, afin que
      # le build CI reste reproductible.
      - run: npm run check
        env:
          VITE_SUPABASE_URL: https://owdvxfvpolawafxzmnyx.supabase.co
          VITE_SUPABASE_PROJECT_ID: owdvxfvpolawafxzmnyx
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZHZ4ZnZwb2xhd2FmeHptbnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODUyNTMsImV4cCI6MjA5NTA2MTI1M30.MySpMqA8J1UzwdECTOKiVNal_hXfvQlIn59GXtl_SKE
          SUPABASE_URL: https://owdvxfvpolawafxzmnyx.supabase.co
          SUPABASE_PROJECT_ID: owdvxfvpolawafxzmnyx
          SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZHZ4ZnZwb2xhd2FmeHptbnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODUyNTMsImV4cCI6MjA5NTA2MTI1M30.MySpMqA8J1UzwdECTOKiVNal_hXfvQlIn59GXtl_SKE
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset --local
      - name: Tests RLS
        run: DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres npm run test:rls
      - name: Préparer l’utilisateur golden
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 <<'SQL'
          insert into auth.users (id, instance_id, aud, role, email, encrypted_password, created_at, updated_at)
          values ('00000000-0000-0000-0000-000000000001', '00000000-0000-0000-0000-000000000000', 'authenticated', 'authenticated', 'golden@example.test', '', now(), now())
          on conflict (id) do nothing;
          SQL
      - name: Test comptable golden
        run: DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres GOLDEN_TEST_USER_ID=00000000-0000-0000-0000-000000000001 npm run test:golden
